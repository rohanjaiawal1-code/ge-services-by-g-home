name: G HOME Status Controller (Manual Only)

on:
  workflow_dispatch: # केवल मैन्युअल बटन दबाने पर चलेगा
    inputs:
      user_id:
        description: 'Enter User ID (Phone Number)'
        required: true
        type: string
      mode:
        description: 'Select Status Mode'
        required: true
        default: 'active'
        type: choice
        options:
          - active
          - expired
          - error

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Manual Status Updater
        env:
          USER_ID: ${{ github.event.inputs.user_id }}
          STATUS_MODE: ${{ github.event.inputs.mode }}
        run: python update_users.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "G-Home-Bot"
          git config --global user.email "bot@g-home.services"
          git add users.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Manual Update: User ${{ github.event.inputs.user_id }} set to ${{ github.event.inputs.mode }}" && git push)

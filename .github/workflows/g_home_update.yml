name: G HOME Status Controller

on:
  schedule:
    - cron: '0 0 * * *' # रोज़ रात 12:00 बजे (Timer Mode) अपने आप चलेगा
  workflow_dispatch: # गिटहब पर मैन्युअल बटन दबाकर चलाने के लिए
    inputs:
      toggle_mode:
        description: 'Choose Action Mode'
        required: true
        default: 'manual'
        type: choice
        options:
          - manual
          - timer
      user_id:
        description: '1. Enter User ID (Phone Number)'
        required: true
        type: string
      mode:
        description: '2. Select Mode (Status)'
        required: true
        default: 'active'
        type: choice
        options:
          - active
          - expired
          - error
      update_date:
        description: '3. Date When Update (Only for Timer Mode - YYYY-MM-DD)'
        required: false
        type: string

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.x'

      - name: Run Status Updater Script
        env:
          TOGGLE_MODE: ${{ github.event.inputs.toggle_mode }}
          USER_ID: ${{ github.event.inputs.user_id }}
          STATUS_MODE: ${{ github.event.inputs.mode }}
          UPDATE_DATE: ${{ github.event.inputs.update_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: python update_users.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "G-Home-Bot"
          git config --global user.email "bot@g-home.services"
          git add users.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "GitHub Action: Status updated via Code Setup" && git push)

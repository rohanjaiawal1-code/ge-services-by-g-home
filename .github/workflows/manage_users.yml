name: "G-HOME Ultimate Admin Panel"

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'क्या एक्शन लेना है? (Action)'
        required: true
        type: choice
        options:
          - change_user_settings
          - new_user
      user_id_phone:
        description: '7. यूजर आईडी / मोबाइल नंबर (User ID Phone)'
        required: true
        type: string
        default: '9876543110'
      name:
        description: '5. यूजर का नाम (Username)'
        required: false
        type: string
      status:
        description: '1. यूजर स्टेटस (Status)'
        required: true
        type: choice
        options:
          - active
          - expired
          - error
      visible_tabs:
        description: '2. UI सेक्शंस (UI Sections - कॉमा लगाकर लिखें जैसे: Movies, Web Series, Upgrade)'
        required: true
        default: 'Live TV, GOTT, SETTINGS'
        type: string
      ott_list:
        description: '3. ओटीटी ऐप्स लिस्ट (OTT List - कॉमा लगाकर लिखें)'
        required: true
        default: 'Gmuvies, JioHotstar, Netflix'
        type: string
      x_date_to_ends:
        description: '4. कितने दिन बाकी हैं? (Days Left Count)'
        required: true
        default: '35'
        type: string
      plan_name:
        description: '6. प्लान का नाम (Plan Info)'
        required: true
        default: 'G HOME X PLUS'
        type: string
      last_charge_day:
        description: '8. आखिरी रिचार्ज दिन काउंट (Last Charge Day)'
        required: true
        default: '10'
        type: string

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync Database Safely
        run: |
          python - <<EOF
          import json

          action = "${{ github.event.inputs.action_type }}"
          phone = "${{ github.event.inputs.user_id_phone }}".strip()
          username = "${{ github.event.inputs.name }}".strip()
          status = "${{ github.event.inputs.status }}"
          plan_info = "${{ github.event.inputs.plan_name }}".strip()
          
          try: days_left = int("${{ github.event.inputs.x_date_to_ends }}")
          except: days_left = 35
          try: last_charge = int("${{ github.event.inputs.last_charge_day }}")
          except: last_charge = 10

          sections = [x.strip() for x in "${{ github.event.inputs.visible_tabs }}".split(",") if x.strip()]
          ott_array = [x.strip() for x in "${{ github.event.inputs.ott_list }}".split(",") if x.strip()]

          file_name = 'users.json'
          with open(file_name, 'r', encoding='utf-8') as f:
              db = json.load(f)

          if action == 'new_user':
              if phone in db['users']:
                  print("::error::User already exists!")
                  exit(1)
              db['users'][phone] = {
                  "username": username if username else "GE_user",
                  "status": status,
                  "days_left": days_left,
                  "last_charge_day": last_charge,
                  "plan_info": plan_info,
                  "ott_list": ott_array,
                  "visible_sections": sections,
                  "web_series": [],
                  "movies": []
              }
          elif action == 'change_user_settings':
              if phone in db['users']:
                  user = db['users'][phone]
                  if username: user['username'] = username
                  user['status'] = status
                  user['days_left'] = days_left
                  user['last_charge_day'] = last_charge
                  user['plan_info'] = plan_info
                  user['ott_list'] = ott_array
                  user['visible_sections'] = sections
              else:
                  print("::error::User not found!")
                  exit(1)

          with open(file_name, 'w', encoding='utf-8') as f:
              json.dump(db, f, indent=2, ensure_ascii=False)
          EOF

      - name: Push to GitHub
        run: |
          git config --global user.name "GE-Admin-Bot"
          git config --global user.email "bot@ganpatii.enterprise"
          git add users.json
          git commit -m "Admin Panel: Sync User Data" || exit 0
          git push

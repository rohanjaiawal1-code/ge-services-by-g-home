name: GE Services Admin Panel GUI

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Customer Device ID'
        required: true
        default: 'unknown_user'
      action_type:
        description: 'Status'
        required: true
        type: choice
        options:
        - active
        - expired

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Update JSON
        run: |
          node -e '
            const fs = require("fs");
            let data = { videos: { welcome: [], offline: [], expired: [], ads: [] }, users: {} };
            if (fs.existsSync("users.json")) {
              try { data = JSON.parse(fs.readFileSync("users.json", "utf8")); } catch(e) {}
            }
            data.users["${{ github.event.inputs.user_id }}".toLowerCase()] = "${{ github.event.inputs.action_type }}";
            fs.writeFileSync("users.json", JSON.stringify(data, null, 2));
          '

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add users.json
          git commit -m "Update user status"
          git push

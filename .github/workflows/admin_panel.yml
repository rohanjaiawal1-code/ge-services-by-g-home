name: GE Services Admin Panel

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID (Enter Mobile Number to Edit)'
        required: true
      action_type:
        description: 'Status'
        required: true
        type: choice
        options:
        - active
        - expired

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Existing User Status
        run: |
          node -e '
            const fs = require("fs");
            let data = JSON.parse(fs.readFileSync("users.json", "utf8"));
            
            const uid = "${{ github.event.inputs.user_id }}";
            const status = "${{ github.event.inputs.action_type }}";
            
            // LOGIC: Sirf tabhi update karein agar user pehle se list mein hai
            if (data.users[uid]) {
                data.users[uid].status = status;
                data.users[uid].updated_at = new Date().toISOString();
                console.log("User found and updated: " + uid);
            } else {
                console.log("Error: User " + uid + " not found in the list!");
                process.exit(1); // Error show karega agar user nahi mila
            }
            
            fs.writeFileSync("users.json", JSON.stringify(data, null, 2));
          '

      - name: Build Clean Addon Build
        run: |
          rm -f service.custom.lockdown.zip
          python3 -c "import zipfile; z = zipfile.ZipFile('service.custom.lockdown.zip', 'w', zipfile.ZIP_DEFLATED); z.write('addon.xml', 'addon.xml'); z.write('service.py', 'service.py'); z.close()"

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add users.json service.custom.lockdown.zip
          git commit -m "Update status for ${{ github.event.inputs.user_id }} to ${{ github.event.inputs.action_type }}" || echo "No changes"
          git push

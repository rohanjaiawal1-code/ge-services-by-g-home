name: GE Services Admin Panel GUI

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'ADD OR UPDATE USER: Type Hostname / Device ID here'
        required: true
        default: 'unknown_user'
      action_type:
        description: 'SET PLAN STATUS'
        required: true
        type: choice
        options:
        - active
        - expired

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update users.json GUI Engine
        run: |
          node -e '
            const fs = require("fs");
            const file = "users.json";
            let data = {};
            
            if (fs.existsSync(file)) {
              try { data = JSON.parse(fs.readFileSync(file, "utf8")); } catch(e) {}
            }
            
            if (!data.videos) data.videos = { welcome: [], offline: [], expired: [], ads: [] };
            if (!data.users) data.users = {};
            
            const custId = "${{ github.event.inputs.user_id }}".trim().lower();
            const status = "${{ github.event.inputs.action_type }}";
            
            if (custId !== "") {
              data.users[custId] = status;
              fs.writeFileSync(file, JSON.stringify(data, null, 2));
              console.log(`Successfully managed user: ${custId} as ${status}`);
            }
          '

      - name: Commit and Push Changes Live
        run: |
          git config --global user.name "GE-Admin-GUI"
          git config --global user.email "admin@ge-home.com"
          git add users.json
          git diff-index --quiet HEAD || git commit -m "GUI Management: Updated ${{ github.event.inputs.user_id }}"
          git push origin main

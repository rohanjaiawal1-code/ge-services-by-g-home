name: GE Services Admin Panel GUI

on:
  workflow_dispatch:
    inputs:
      customer_id:
        description: 'Customer Device Name / Hostname (e.g., abhishek-tv)'
        required: true
        default: 'unknown_user'
      action_type:
        description: 'Plan Status Change'
        required: true
        type: choice
        options:
        - active
        - expired

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update users.json GUI Engine
        run: |
          node -e '
            const fs = require("fs");
            const file = "users.json";
            let data = {};
            
            // 1. Pehle se maujood users.json ka data safe read karo
            if (fs.existsSync(file)) {
              try {
                data = JSON.parse(fs.readFileSync(file, "utf8"));
              } catch(e) {
                console.log("Parsing error, creating base structure");
              }
            }
            
            // 2. Agar structure missing hai toh safeguard lagao taaki video links na udein
            if (!data.videos) {
              data.videos = { welcome: [], offline: [], expired: [], ads: [] };
            }
            if (!data.users) {
              data.users = {};
            }
            
            const custId = "${{ github.event.inputs.customer_id }}".trim().lower();
            const status = "${{ github.event.inputs.action_type }}";
            
            // 3. Pehle wale data ko bina chhede, naya user ADD ya CHANGE karo
            data.users[custId] = status;
            
            // 4. File ko wapas sundar format me save kar do
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
          '

      - name: Commit and Push Changes Live
        run: |
          git config --global user.name "GE-Admin-GUI"
          git config --global user.email "admin@ge-home.com"
          git add users.json
          git diff-index --quiet HEAD || git commit -m "GUI Management: ${{ github.event.inputs.customer_id }} set to ${{ github.event.inputs.action_type }}"
          git push origin main

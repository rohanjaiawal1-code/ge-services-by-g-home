name: GE Services Admin Panel GUI

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Customer Device ID'
        required: true
        default: 'unknown_user'
      action_type:
        description: 'Status'
        required: true
        type: choice
        options:
        - active
        - expired
        - new_trial

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update JSON with 15 Days Auto-Trial
        run: |
          node -e '
            const fs = require("fs");
            let data = { videos: { welcome: [], offline: [], expired: [], ads: [] }, users: {} };
            if (fs.existsSync("users.json")) {
              try { data = JSON.parse(fs.readFileSync("users.json", "utf8")); } catch(e) {}
            }
            
            const uid = "${{ github.event.inputs.user_id }}".toLowerCase().strip();
            const action = "${{ github.event.inputs.action_type }}";
            
            if (action === "new_trial") {
              const now = new Date();
              const expiry = new Date();
              expiry.setDate(now.getDate() + 15); // 15 Days Trial Add Kiya
              
              data.users[uid] = {
                status: "active",
                type: "trial",
                expiry_date: expiry.toISOString().split("T")[0] // YYYY-MM-DD format
              };
            } else {
              // Manual Active ya Expired override ke liye
              data.users[uid] = {
                status: action,
                type: "manual",
                expiry_date: action === "active" ? "infinite" : "expired"
              };
            }
            
            fs.writeFileSync("users.json", JSON.stringify(data, null, 2));
          '

      - name: Build Clean Addon Build
        run: |
          rm -f service.custom.lockdown.zip
          python3 -c "import zipfile; z = zipfile.ZipFile('service.custom.lockdown.zip', 'w', zipfile.ZIP_DEFLATED); z.write('addon.xml', 'addon.xml'); z.write('service.py', 'service.py'); z.close()"

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add users.json service.custom.lockdown.zip
          git commit -m "Update user status and temporal bounds" || echo "No changes"
          git push

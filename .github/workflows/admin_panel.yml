name: GE Services Admin Panel GUI

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID (Mobile Number or Username)'
        required: true
        default: '0000000000'
      action_type:
        description: 'Status (ON = active, OFF = expired)'
        required: true
        type: choice
        options:
        - active
        - expired

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update JSON Status
        run: |
          node -e '
            const fs = require("fs");
            let data = { videos: { welcome: [], offline: [], expired: [], ads: [] }, users: {} };
            if (fs.existsSync("users.json")) {
              try { data = JSON.parse(fs.readFileSync("users.json", "utf8")); } catch(e) {}
            }
            
            const uid = "${{ github.event.inputs.user_id }}";
            const status = "${{ github.event.inputs.action_type }}";
            
            // User entry create karein agar nahi hai toh
            if (!data.users[uid]) {
                data.users[uid] = { username: uid };
            }
            
            // Status update (Active ya Expired)
            data.users[uid].status = status;
            data.users[uid].updated_at = new Date().toISOString();
            
            fs.writeFileSync("users.json", JSON.stringify(data, null, 2));
          '

      - name: Build Clean Addon Build
        run: |
          rm -f service.custom.lockdown.zip
          python3 -c "import zipfile; z = zipfile.ZipFile('service.custom.lockdown.zip', 'w', zipfile.ZIP_DEFLATED); z.write('addon.xml', 'addon.xml'); z.write('service.py', 'service.py'); z.close()"

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add users.json service.custom.lockdown.zip
          git commit -m "Update status for ${{ github.event.inputs.user_id }}: ${{ github.event.inputs.action_type }}" || echo "No changes"
          git push
